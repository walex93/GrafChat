# Codemagic configuration for PWABuilder iOS project
# Generated on 03/04/2026

workflows:
  ios-build:
    name: Build iOS PWA
    working_directory: src
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Debug - list files
        script: |
          echo "Current directory: $(pwd)"
          echo "Contents of src folder:"
          ls -la
          echo ""
          echo "Looking for .xcworkspace directories:"
          find . -name "*.xcworkspace" -type d
          echo ""
          echo "Looking for .xcodeproj directories:"
          find . -name "*.xcodeproj" -type d
      
      - name: Install CocoaPods dependencies
        script: |
          pod install --repo-update
      
      - name: Code signing setup
        script: |
          xcode-project use-profiles
      
      - name: Build IPA
        script: |
          # Находим папку .xcworkspace (не файл)
          WORKSPACE_DIR=$(find . -name "*.xcworkspace" -type d -maxdepth 1 | head -n 1)
          PROJECT_DIR=$(find . -name "*.xcodeproj" -type d -maxdepth 1 | head -n 1)
          
          echo "Found workspace directory: $WORKSPACE_DIR"
          echo "Found project directory: $PROJECT_DIR"
          echo ""
          
          if [ -n "$WORKSPACE_DIR" ]; then
            echo "Building with workspace: $WORKSPACE_DIR"
            # Извлекаем имя схемы из имени папки (убираем .xcworkspace)
            SCHEME_NAME=$(basename "$WORKSPACE_DIR" .xcworkspace)
            echo "Using scheme: $SCHEME_NAME"
            
            xcode-project build-ipa \
              --workspace "$WORKSPACE_DIR" \
              --scheme "$SCHEME_NAME"
          elif [ -n "$PROJECT_DIR" ]; then
            echo "Building with project: $PROJECT_DIR"
            SCHEME_NAME=$(basename "$PROJECT_DIR" .xcodeproj)
            echo "Using scheme: $SCHEME_NAME"
            
            xcode-project build-ipa \
              --project "$PROJECT_DIR" \
              --scheme "$SCHEME_NAME"
          else
            echo "No Xcode project or workspace found!"
            exit 1
          fi
    
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com
