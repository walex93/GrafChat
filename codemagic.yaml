# codemagic.yaml
workflows:
  build:  # <- ИСПОЛЬЗУЕМ ЭТОТ ID (он точно работает!)
    name: Build for REAL DEVICE
    working_directory: src
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          pod install --repo-update
      
      - name: Build for REAL DEVICE (unsigned)
        script: |
          # Очистка предыдущих сборок
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # Сборка для реального устройства
          xcodebuild clean build \
            -workspace "GrafChat.xcworkspace" \
            -scheme "GrafChat" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Find and copy .app
        script: |
          echo "🔍 Looking for built .app..."
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          
          if [ -n "$APP_PATH" ]; then
            echo "✅ Found .app at: $APP_PATH"
            cp -R "$APP_PATH" ./GrafChat.app
            echo "✅ .app copied to current directory"
            
            # Показать размер файла
            du -sh ./GrafChat.app
          else
            echo "❌ ERROR: .app not found!"
            echo "Contents of DerivedData:"
            ls -la ~/Library/Developer/Xcode/DerivedData/
            exit 1
          fi
      
      - name: Create IPA structure
        script: |
          # Создаем правильную структуру IPA
          mkdir -p Payload
          cp -R GrafChat.app Payload/
          zip -r GrafChat.ipa Payload
          rm -rf Payload
          echo "✅ IPA created: GrafChat.ipa"
    
    artifacts:
      - GrafChat.app
      - GrafChat.ipa
