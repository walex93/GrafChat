workflows:
  ios-build:
    name: Build iOS PWA
    working_directory: src
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials  # группа с вашими ключами API
    integrations:
      app_store_connect: your_api_key_name  # имя из интеграций
    
    scripts:
      - name: Install dependencies
        script: pod install --repo-update
      
      - name: Fetch signing files automatically
        script: |
          app-store-connect fetch-signing-files "com.yourcompany.grafchat" \
            --type IOS_APP_STORE \
            --create
      
      - name: Set up signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "GrafChat.xcworkspace" \
            --scheme "GrafChat"
    
    artifacts:
      - build/ios/ipa/*.ipa
