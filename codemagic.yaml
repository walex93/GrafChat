# codemagic.yaml
workflows:
  build:
    name: Build iOS - NO SIGNING
    working_directory: src
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          pod install --repo-update
      
      - name: Build for REAL DEVICE (NO SIGNING)
        script: |
          # Полностью отключаем подпись
          xcodebuild clean build \
            -workspace "GrafChat.xcworkspace" \
            -scheme "GrafChat" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
      
      - name: Find .app
        script: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "✅ Found .app at $APP_PATH"
            cp -R "$APP_PATH" ./GrafChat.app
          else
            echo "❌ .app not found!"
            exit 1
          fi
    
    artifacts:
      - GrafChat.app
