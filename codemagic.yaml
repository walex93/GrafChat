# codemagic.yaml
workflows:
  ios-build:
    name: Build iOS PWA - Simulator
    working_directory: src
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          pod install --repo-update
      
      - name: List available simulators
        script: |
          echo "Available simulators:"
          xcrun simctl list devices available
      
      - name: Build for Simulator
        script: |
          # Используем iPhone 17 Pro (который есть в списке)
          xcodebuild build \
            -workspace "GrafChat.xcworkspace" \
            -scheme "GrafChat" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Create .app bundle
        script: |
          echo "Build completed! Looking for .app file..."
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
