# codemagic.yaml
workflows:
  ios-build:
    name: Build iOS PWA - Universal Simulator
    working_directory: src
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          pod install --repo-update
      
      - name: Universal Simulator Build
        script: |
          echo "Building universal binary for all iOS Simulators..."
          
          # Очистка предыдущих сборок
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # Универсальная сборка
          xcodebuild build \
            -workspace "GrafChat.xcworkspace" \
            -scheme "GrafChat" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Locate and prepare .app bundle
        script: |
          echo "Looking for built app..."
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            cp -R "$APP_PATH" ./GrafChat.app
            echo "App copied to current directory"
            
            # Создать информацию об архитектурах
            echo "App architectures:"
            lipo -info "$APP_PATH/GrafChat" || echo "Binary info not available"
          else
            echo "App not found!"
            exit 1
          fi
    
    artifacts:
      - GrafChat.app
